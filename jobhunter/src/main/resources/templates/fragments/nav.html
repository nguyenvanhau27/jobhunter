<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head></head>
<body>

<nav th:fragment="nav" style="background:#f0f0f0; padding:10px; margin-bottom:20px;">

    <a th:href="@{/}" style="font-weight:bold; margin-right:20px;">JobHunter</a>
    <a th:href="@{/jobs}" style="margin-right:10px;">Việc làm</a>

    <!-- ── GUEST ── -->
    <span sec:authorize="isAnonymous()">
        <a th:href="@{/login}" style="margin-right:10px;">Đăng nhập</a>
        <a th:href="@{/register}" style="margin-right:10px;">Đăng ký</a>
    </span>

    <!-- ── USER ── -->
    <span sec:authorize="hasRole('USER')">
        <a th:href="@{/profile}" style="margin-right:10px;">Profile</a>
        <a th:href="@{/user/skills}" style="margin-right:10px;">Kỹ năng</a>
        <a th:href="@{/profile/change-password}" style="margin-right:10px;">Đổi mật khẩu</a>
        <a th:href="@{/applications/my}" style="margin-right:10px;">Đơn ứng tuyển</a>
        <span style="margin-left:20px;">
            Xin chào, <strong sec:authentication="name"></strong>
        </span>
        <form th:action="@{/logout}" method="post" style="display:inline; margin-left:10px;">
            <button type="submit">Đăng xuất</button>
        </form>
    </span>

    <!-- ── ADMIN ── -->
    <span sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin/dashboard}" style="margin-right:10px;">Dashboard</a>
        <a th:href="@{/admin/companies}" style="margin-right:10px;">Công ty</a>
        <a th:href="@{/admin/jobs}" style="margin-right:10px;">Quản lý Job</a>
        <a th:href="@{/admin/skills}" style="margin-right:10px;">Kỹ năng</a>
        <a th:href="@{/admin/users}" style="margin-right:10px;">Người dùng</a>
        <span style="margin-left:20px;">
            Admin: <strong sec:authentication="name"></strong>
        </span>
        <form th:action="@{/logout}" method="post" style="display:inline; margin-left:10px;">
            <button type="submit">Đăng xuất</button>
        </form>
    </span>

    <!-- ── Language switcher ── -->
    <span style="float:right;">
        <a th:href="@{''(lang=vi)}">🇻🇳</a>
        &nbsp;|&nbsp;
        <a th:href="@{''(lang=en)}">🇬🇧</a>
    </span>

</nav>

</body>
</html>
