<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<h2>Đổi mật khẩu</h2>

<div th:if="${successMessage}" style="color:green; font-weight:bold;">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${errorMessage}" style="color:red; font-weight:bold;">
    <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/profile/change-password}" method="post">

    <div>
        <label>Mật khẩu hiện tại:</label><br/>
        <input type="password" name="oldPassword" required/>
    </div>
    <br/>
    <div>
        <label>Mật khẩu mới (ít nhất 6 ký tự):</label><br/>
        <input type="password" name="newPassword" required minlength="6"/>
    </div>
    <br/>
    <div>
        <label>Xác nhận mật khẩu mới:</label><br/>
        <input type="password" name="confirmPassword" required minlength="6"/>
    </div>
    <br/>
    <button type="submit">Đổi mật khẩu</button>
    <a th:href="@{/profile}">Huỷ</a>

</form>

</body>
</html>
