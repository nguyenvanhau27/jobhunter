<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn ứng tuyển của tôi</title>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<h2>Đơn ứng tuyển của tôi</h2>

<div th:if="${successMessage}" style="color:green; font-weight:bold;">
    <p th:text="${successMessage}"></p>
</div>

<div th:if="${#lists.isEmpty(applications)}">
    <p>Bạn chưa ứng tuyển job nào. <a th:href="@{/jobs}">Tìm việc ngay</a></p>
</div>

<table th:unless="${#lists.isEmpty(applications)}"
       border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>Vị trí</th>
        <th>Công ty</th>
        <th>Ngày nộp</th>
        <th>Trạng thái</th>
        <th>CV</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="app : ${applications}">
        <td>
            <a th:href="@{/jobs/{id}(id=${app.job.id})}"
               th:text="${app.job.title}">
            </a>
        </td>
        <td th:text="${app.job.company.nameCompany}"></td>
        <td th:text="${#temporals.format(app.appliedAt, 'dd/MM/yyyy HH:mm')}"></td>
        <td>
            <!-- Màu theo trạng thái -->
            <span th:text="${app.status}"
                  th:style="${app.status.toString() == 'APPROVED'} ? 'color:green; font-weight:bold'
                               : (${app.status.toString() == 'REJECTED'} ? 'color:red'
                               : 'color:orange')">
                </span>
        </td>
        <td>
            <a th:href="@{/{cvFile}(cvFile=${app.cvFile})}"
               target="_blank">
                Xem CV
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
