<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách ứng viên</title>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<a th:href="@{/admin/jobs}">← Quay lại danh sách job</a>
<h2>Ứng viên cho: <span th:text="${job.title}"></span></h2>
<p style="color:gray;">
    Công ty: <strong th:text="${job.company.nameCompany}"></strong>
</p>

<div th:if="${successMessage}" style="color:green; font-weight:bold;">
    <p th:text="${successMessage}"></p>
</div>

<div th:if="${#lists.isEmpty(applications)}">
    <p>Chưa có ứng viên nào cho vị trí này.</p>
</div>

<table th:unless="${#lists.isEmpty(applications)}"
       border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>Ứng viên</th>
        <th>Email</th>
        <th>Ngày nộp</th>
        <th>Trạng thái</th>
        <th>CV</th>
        <th>Cover Letter</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="app : ${applications}">
        <td th:text="${app.user.fullName}"></td>
        <td th:text="${app.user.email}"></td>
        <td th:text="${#temporals.format(app.appliedAt, 'dd/MM/yyyy HH:mm')}"></td>

        <!-- Trạng thái -->
        <td>
                <span th:text="${app.status}"
                      th:style="${app.status.toString() == 'APPROVED'} ? 'color:green; font-weight:bold'
                               : (${app.status.toString() == 'REJECTED'} ? 'color:red'
                               : 'color:orange')">
                </span>
        </td>

        <!-- Download CV -->
        <td>
            <a th:if="${app.cvFile != null}"
               th:href="@{/{cvFile}(cvFile=${app.cvFile})}"
               download>
                ⬇ Tải CV
            </a>
        </td>

        <!-- Cover Letter preview -->
        <td style="max-width:200px; overflow:hidden;">
                <span th:if="${app.coverLetter != null}"
                      th:text="${#strings.abbreviate(app.coverLetter, 80)}">
                </span>
            <span th:unless="${app.coverLetter != null}" style="color:gray;">
                    (Không có)
                </span>
        </td>

        <!-- Thao tác -->
        <td>
            <!-- Approve -->
            <form th:action="@{/admin/jobs/{jobId}/applications/{appId}/approve(jobId=${job.id}, appId=${app.id})}"
                  method="post" style="display:inline">
                <button type="submit"
                        th:disabled="${app.status.toString() == 'APPROVED'}"
                        onclick="return confirm('Duyệt đơn này?')">
                    ✓ Duyệt
                </button>
            </form>

            &nbsp;

            <!-- Reject -->
            <form th:action="@{/admin/jobs/{jobId}/applications/{appId}/reject(jobId=${job.id}, appId=${app.id})}"
                  method="post" style="display:inline">
                <button type="submit"
                        th:disabled="${app.status.toString() == 'REJECTED'}"
                        onclick="return confirm('Từ chối đơn này?')">
                    ✗ Từ chối
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
