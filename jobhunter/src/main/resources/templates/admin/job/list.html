<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Job</title>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<h2>Quản lý Job</h2>

<!-- Thông báo -->
<div th:if="${successMessage}" style="color: green; font-weight: bold;">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${errorMessage}" style="color: red; font-weight: bold;">
    <p th:text="${errorMessage}"></p>
</div>

<a th:href="@{/admin/jobs/create}">
    <button>+ Tạo Job mới</button>
</a>

<br/><br/>

<div th:if="${jobs.isEmpty()}">
    <p>Chưa có job nào.</p>
</div>

<table th:unless="${jobs.isEmpty()}" border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tiêu đề</th>
        <th>Công ty</th>
        <th>Địa điểm</th>
        <th>Loại</th>
        <th>Kinh nghiệm</th>
        <th>Trạng thái</th>
        <th>Skills</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="job : ${jobs}">
        <td th:text="${job.id}"></td>
        <td th:text="${job.title}"></td>
        <td th:text="${job.company.nameCompany}"></td>
        <td th:text="${job.location}"></td>
        <td th:text="${job.jobType}"></td>
        <td th:text="${job.experienceLevel}"></td>
        <td>
                <span th:text="${job.statusJob}"
                      th:style="${job.statusJob.name() == 'OPEN'} ? 'color:green' : 'color:red'">
                </span>
        </td>
        <td>
                <span th:each="skill, iter : ${job.skills}">
                    <span th:text="${skill.name}"></span><span th:if="!${iter.last}">, </span>
                </span>
        </td>
        <td>
            <!-- Sửa -->
            <a th:href="@{/admin/jobs/{id}/edit(id=${job.id})}">Sửa</a>
            &nbsp;|&nbsp;
            <!-- Xoá -->
            <form th:action="@{/admin/jobs/{id}/delete(id=${job.id})}"
                  method="post" style="display:inline">
                <button type="submit"
                        onclick="return confirm('Xoá job này?')">
                    Xoá
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
