<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Form</title>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<!-- Tiêu đề: tạo mới hay cập nhật -->
<h2 th:text="${jobId} ? 'Cập nhật Job' : 'Tạo Job mới'"></h2>

<form th:with="actionUrl=${jobId} ? '/admin/jobs/' + ${jobId} + '/edit' : '/admin/jobs/create'"
      th:action="${actionUrl}"
      th:object="${jobDTO}"
      method="post">

    <table cellpadding="6">

        <tr>
            <td><label>Tiêu đề:</label></td>
            <td>
                <input type="text" th:field="*{title}" size="50"/>
                <span th:if="${#fields.hasErrors('title')}"
                      th:errors="*{title}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Công ty:</label></td>
            <td>
                <select th:field="*{companyId}" required>
                    <option value="">-- Chọn công ty --</option>
                    <option th:each="c : ${companies}"
                            th:value="${c.id}"
                            th:text="${c.nameCompany}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('companyId')}"
                      th:errors="*{companyId}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Địa điểm:</label></td>
            <td>
                <input type="text" th:field="*{location}" size="30"/>
                <span th:if="${#fields.hasErrors('location')}"
                      th:errors="*{location}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Loại công việc:</label></td>
            <td>
                <select th:field="*{jobType}" required>
                    <option value="">-- Chọn loại --</option>
                    <option th:each="jt : ${jobTypes}"
                            th:value="${jt}"
                            th:text="${jt}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('jobType')}"
                      th:errors="*{jobType}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Kinh nghiệm:</label></td>
            <td>
                <select th:field="*{experienceLevel}" required>
                    <option value="">-- Chọn cấp độ --</option>
                    <option th:each="exp : ${experienceLevels}"
                            th:value="${exp}"
                            th:text="${exp}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('experienceLevel')}"
                      th:errors="*{experienceLevel}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Lương tối thiểu:</label></td>
            <td>
                <input type="number" th:field="*{minSalary}" min="0"/>
                <span th:if="${#fields.hasErrors('minSalary')}"
                      th:errors="*{minSalary}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Lương tối đa:</label></td>
            <td>
                <input type="number" th:field="*{maxSalary}" min="0"/>
                <span th:if="${#fields.hasErrors('maxSalary')}"
                      th:errors="*{maxSalary}" style="color:red;"></span>
            </td>
        </tr>

        <tr>
            <td><label>Kỹ năng yêu cầu:</label></td>
            <td>
                <!-- Multi-select: giữ Ctrl/Cmd để chọn nhiều -->
                <select name="skillIds" multiple size="8" style="width:250px;">
                    <option th:each="skill : ${allSkills}"
                            th:value="${skill.id}"
                            th:text="${skill.name}"
                            th:selected="${jobDTO.skillIds != null and jobDTO.skillIds.contains(skill.id)}">
                    </option>
                </select>
                <br/>
                <small style="color:gray;">Giữ Ctrl (Windows) hoặc Cmd (Mac) để chọn nhiều skill</small>
            </td>
        </tr>

        <tr>
            <td><label>Mô tả:</label></td>
            <td>
                <textarea th:field="*{description}" rows="5" cols="50"></textarea>
            </td>
        </tr>

        <tr>
            <td><label>Yêu cầu:</label></td>
            <td>
                <textarea th:field="*{requirements}" rows="5" cols="50"></textarea>
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <button type="submit">Lưu</button>
                &nbsp;
                <a th:href="@{/admin/jobs}">Huỷ</a>
            </td>
        </tr>

    </table>
</form>

</body>
</html>
