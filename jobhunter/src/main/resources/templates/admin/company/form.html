<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${companyId} ? 'Cập nhật Công ty – Admin' : 'Tạo Công ty mới – Admin'">Company Form</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-job.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-company.css}"/>
</head>
<body class="admin-body">

<div class="admin-shell">

    <!-- ╔═══════════════════════════════╗
         ║  SIDEBAR                     ║
         ╚═══════════════════════════════╝ -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-sidebar-brand">
            <div class="admin-sidebar-brand-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                    <line x1="12" y1="12" x2="12" y2="16"/>
                    <line x1="10" y1="14" x2="14" y2="14"/>
                </svg>
            </div>
            <div class="admin-sidebar-brand-text">
                <div class="admin-sidebar-brand-name">Admin Panel</div>
                <div class="admin-sidebar-brand-sub">ITJobHub</div>
            </div>
        </div>
        <nav class="admin-sidebar-nav">
            <div class="admin-sidebar-section-label">Main</div>
            <a th:href="@{/admin/dashboard}" class="admin-nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                Dashboard
            </a>
            <div class="admin-sidebar-section-label" style="margin-top:8px;">Management</div>
            <a th:href="@{/admin/jobs}" class="admin-nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                </svg>
                Quản lý Job
            </a>
            <a th:href="@{/admin/users}" class="admin-nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Quản lý User
            </a>
            <a th:href="@{/admin/companies}" class="admin-nav-item active">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Quản lý Công ty
            </a>
            <div class="admin-sidebar-section-label" style="margin-top:8px;">System</div>
            <a th:href="@{/admin/settings}" class="admin-nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Cài đặt hệ thống
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <div class="admin-sidebar-collapse" id="sidebarCollapseBtn">
                <svg viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                <span>Thu gọn</span>
            </div>
        </div>
    </aside>

    <!-- ╔═══════════════════════════════╗
         ║  MAIN AREA                   ║
         ╚═══════════════════════════════╝ -->
    <div class="admin-main">

        <header class="admin-topbar">
            <div class="admin-breadcrumb">
                <a th:href="@{/}">Home</a>
                <span class="sep">›</span>
                <a th:href="@{/admin/dashboard}">Dashboard</a>
                <span class="sep">›</span>
                <a th:href="@{/admin/companies}">Quản lý Công ty</a>
                <span class="sep">›</span>
                <span class="current"
                      th:text="${companyId} ? 'Chỉnh sửa #' + ${companyId} : 'Tạo mới'">Form</span>
            </div>
            <div class="admin-topbar-right">
                <div class="admin-topbar-avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>
        </header>

        <main class="admin-content">

            <!-- Page header -->
            <div class="admin-page-header">
                <div>
                    <h1 class="admin-page-title"
                        th:text="${companyId} ? 'Cập nhật: ' + ${companyDTO.nameCompany} : 'Tạo công ty mới'">
                        Company Form
                    </h1>
                    <p class="admin-page-subtitle"
                       th:text="${companyId} ? 'Chỉnh sửa thông tin công ty' : 'Điền thông tin để thêm công ty mới vào hệ thống'">
                    </p>
                </div>
            </div>

            <!-- Error -->
            <div th:if="${errorMessage}" class="flash-error" style="margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                         style="flex-shrink:0">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span th:text="${errorMessage}"></span>
                </div>
            </div>

            <!-- ── FORM ─────────────────────────────── -->
            <form th:with="actionUrl=${companyId} ? '/admin/companies/' + ${companyId} + '/edit' : '/admin/companies/create'"
                  th:action="${actionUrl}"
                  th:object="${companyDTO}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-layout">

                    <!-- ── Left: main fields ────────────── -->
                    <div class="form-main">

                        <!-- Section: Thông tin cơ bản -->
                        <div class="form-section">
                            <h2 class="form-section-title">Thông tin cơ bản</h2>

                            <!-- Tên công ty -->
                            <div class="form-group">
                                <label class="form-label" for="nameCompany">
                                    Tên công ty <span class="required">*</span>
                                </label>
                                <input type="text" id="nameCompany" th:field="*{nameCompany}"
                                       class="form-input"
                                       th:classappend="${#fields.hasErrors('nameCompany')} ? ' is-error'"
                                       placeholder="VD: Tiki Corporation"/>
                                <span th:if="${#fields.hasErrors('nameCompany')}"
                                      class="form-error" th:errors="*{nameCompany}"></span>
                            </div>

                            <!-- Địa điểm + Quy mô -->
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label" for="location">Địa điểm</label>
                                    <input type="text" id="location" th:field="*{location}"
                                           class="form-input"
                                           placeholder="Hồ Chí Minh, Hà Nội..."/>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="size">Quy mô</label>
                                    <div class="select-wrap">
                                        <select id="size" th:field="*{size}" class="form-select">
                                            <option value="">-- Chọn quy mô --</option>
                                            <option value="SMALL">SMALL (dưới 50 người)</option>
                                            <option value="MEDIUM">MEDIUM (50–200 người)</option>
                                            <option value="LARGE">LARGE (trên 200 người)</option>
                                        </select>
                                        <svg class="select-arrow" viewBox="0 0 24 24">
                                            <polyline points="6 9 12 15 18 9"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>

                            <!-- Website -->
                            <div class="form-group">
                                <label class="form-label" for="website">Website</label>
                                <div style="position:relative;">
                                    <span class="input-prefix">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14"
                                             height="14"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22"
                                                                                               y2="12"/><path
                                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                    </span>
                                    <input type="text" id="website" th:field="*{website}"
                                           class="form-input with-prefix"
                                           placeholder="https://example.com"/>
                                </div>
                            </div>
                        </div>

                        <!-- Section: Mô tả -->
                        <div class="form-section">
                            <h2 class="form-section-title">Mô tả công ty</h2>
                            <div class="form-group">
                                <textarea id="description" th:field="*{description}"
                                          class="form-textarea"
                                          rows="7"
                                          placeholder="Giới thiệu tổng quan về công ty, văn hóa, sản phẩm/dịch vụ..."></textarea>
                            </div>
                        </div>

                    </div>
                    <!-- /form-main -->

                    <!-- ── Right: logo preview ──────────── -->
                    <div class="form-side">
                        <div class="form-section">
                            <h2 class="form-section-title">Logo công ty</h2>

                            <!-- Logo preview -->
                            <div class="logo-preview-wrap">
                                <div class="logo-preview" id="logoPreview">
                                    <!-- Shows image if URL is filled, else placeholder -->
                                    <img id="logoPreviewImg"
                                         th:src="${companyDTO.imageUrl}"
                                         th:style="${companyDTO.imageUrl != null and !#strings.isEmpty(companyDTO.imageUrl)} ? '' : 'display:none'"
                                         alt="Logo preview"
                                         onerror="this.style.display='none';document.getElementById('logoPreviewPlaceholder').style.display='flex'"/>
                                    <div id="logoPreviewPlaceholder"
                                         class="logo-preview-placeholder"
                                         th:style="${companyDTO.imageUrl != null and !#strings.isEmpty(companyDTO.imageUrl)} ? 'display:none' : 'display:flex'">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                            <rect x="3" y="3" width="18" height="18" rx="3"/>
                                            <circle cx="8.5" cy="8.5" r="1.5"/>
                                            <polyline points="21 15 16 10 5 21"/>
                                        </svg>
                                        <span>Logo preview</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Image URL input -->
                            <div class="form-group" style="margin-top:14px;">
                                <label class="form-label" for="imageUrl">URL ảnh logo</label>
                                <input type="text" id="imageUrl" th:field="*{imageUrl}"
                                       class="form-input"
                                       placeholder="https://example.com/logo.png"/>
                                <p class="form-hint">Nhập URL ảnh PNG/JPG để hiển thị logo</p>
                            </div>
                        </div>
                    </div>
                    <!-- /form-side -->

                </div>
                <!-- /form-layout -->

                <!-- Form actions -->
                <div class="form-actions">
                    <a th:href="@{/admin/companies}" class="btn-form-cancel">Huỷ</a>
                    <button type="submit" class="btn-form-submit">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        <span th:text="${companyId} ? 'Lưu thay đổi' : 'Tạo công ty'">Lưu</span>
                    </button>
                </div>

            </form>
        </main>
    </div>
</div>

<script>
    document.getElementById('sidebarCollapseBtn').addEventListener('click', () => {
        document.getElementById('adminSidebar').classList.toggle('open');
    });

    // Live logo preview when URL input changes
    const imageUrlInput = document.getElementById('imageUrl');
    const previewImg = document.getElementById('logoPreviewImg');
    const placeholder = document.getElementById('logoPreviewPlaceholder');

    function updateLogoPreview(url) {
        if (url && url.trim()) {
            previewImg.src = url.trim();
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            previewImg.style.display = 'none';
            placeholder.style.display = 'flex';
        }
    }

    imageUrlInput.addEventListener('input', function () {
        updateLogoPreview(this.value);
    });

    previewImg.addEventListener('error', function () {
        this.style.display = 'none';
        placeholder.style.display = 'flex';
    });
</script>

</body>
</html>
