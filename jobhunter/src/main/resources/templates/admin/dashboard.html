<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<h2>Dashboard</h2>
<p style="color:gray;">
    Cập nhật lúc: <span th:text="${#temporals.format(now, 'dd/MM/yyyy HH:mm')}"></span>
</p>
<hr/>

<!-- ─── Thống kê tổng quan ───────────────────────────────── -->
<table border="0" cellpadding="12" cellspacing="0">
    <tr>
        <!-- Job -->
        <td style="border:1px solid #ccc; padding:16px; min-width:150px;">
            <div style="font-size:12px; color:gray;">TỔNG JOB</div>
            <div style="font-size:28px; font-weight:bold;"
                 th:text="${totalJobs}"></div>
            <div style="margin-top:6px;">
                <span style="color:green;">OPEN: <strong th:text="${openJobs}"></strong></span>
                &nbsp;|&nbsp;
                <span style="color:red;">CLOSED: <strong th:text="${closedJobs}"></strong></span>
            </div>
            <a th:href="@{/admin/jobs}" style="font-size:12px;">→ Quản lý Job</a>
        </td>

        <!-- Application -->
        <td style="border:1px solid #ccc; padding:16px; min-width:150px;">
            <div style="font-size:12px; color:gray;">TỔNG ĐƠN ỨNG TUYỂN</div>
            <div style="font-size:28px; font-weight:bold;"
                 th:text="${totalApplications}"></div>
            <div style="margin-top:6px;">
                <span style="color:orange;">Chờ: <strong th:text="${pendingApplications}"></strong></span>
                &nbsp;|&nbsp;
                <span style="color:green;">Duyệt: <strong th:text="${approvedApplications}"></strong></span>
                &nbsp;|&nbsp;
                <span style="color:red;">Từ chối: <strong th:text="${rejectedApplications}"></strong></span>
            </div>
        </td>

        <!-- User -->
        <td style="border:1px solid #ccc; padding:16px; min-width:150px;">
            <div style="font-size:12px; color:gray;">TỔNG USER</div>
            <div style="font-size:28px; font-weight:bold;"
                 th:text="${totalUsers}"></div>
            <div style="margin-top:6px;">
                <span style="color:green;">Active: <strong th:text="${activeUsers}"></strong></span>
                &nbsp;|&nbsp;
                <span style="color:red;">Khoá: <strong
                        th:text="${totalUsers - activeUsers}"></strong></span>
            </div>
            <a th:href="@{/admin/users}" style="font-size:12px;">→ Quản lý User</a>
        </td>

        <!-- Company -->
        <td style="border:1px solid #ccc; padding:16px; min-width:150px;">
            <div style="font-size:12px; color:gray;">TỔNG CÔNG TY</div>
            <div style="font-size:28px; font-weight:bold;"
                 th:text="${totalCompanies}"></div>
            <a th:href="@{/admin/companies}" style="font-size:12px;">→ Quản lý Công ty</a>
        </td>
    </tr>
</table>

<hr/>

<!-- ─── 10 đơn ứng tuyển mới nhất ───────────────────────── -->
<h3>Đơn ứng tuyển mới nhất</h3>

<div th:if="${#lists.isEmpty(recentApplications)}">
    <p style="color:gray;">Chưa có đơn ứng tuyển nào.</p>
</div>

<table th:unless="${#lists.isEmpty(recentApplications)}"
       border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>Ứng viên</th>
        <th>Email</th>
        <th>Vị trí</th>
        <th>Công ty</th>
        <th>Ngày nộp</th>
        <th>Trạng thái</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="app : ${recentApplications}">
        <td th:text="${app.user.fullName}"></td>
        <td th:text="${app.user.email}"></td>
        <td th:text="${app.job.title}"></td>
        <td th:text="${app.job.company.nameCompany}"></td>
        <td th:text="${#temporals.format(app.appliedAt, 'dd/MM/yyyy HH:mm')}"></td>
        <td>
                <span th:text="${app.status}"
                      th:style="${app.status.toString() == 'APPROVED'} ? 'color:green; font-weight:bold'
                               : (${app.status.toString() == 'REJECTED'} ? 'color:red'
                               : 'color:orange')">
                </span>
        </td>
        <td>
            <a th:href="@{/admin/jobs/{jobId}/applications(jobId=${app.job.id})}">
                Xem đơn
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
