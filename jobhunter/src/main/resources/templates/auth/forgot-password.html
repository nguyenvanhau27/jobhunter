<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
</head>
<body>

<h2>Quên mật khẩu</h2>

<div th:if="${successMessage}" style="color:green; font-weight:bold;">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${errorMessage}" style="color:red; font-weight:bold;">
    <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/forgot-password}" method="post">
    <div>
        <label>Nhập email tài khoản của bạn:</label><br/>
        <input type="email" name="email" required size="35"/>
    </div>
    <br/>
    <button type="submit">Gửi email đặt lại mật khẩu</button>
</form>

<br/>
<a th:href="@{/login}">← Quay lại đăng nhập</a>

</body>
</html>
