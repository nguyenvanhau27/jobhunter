<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quên mật khẩu — JobHunter</title>
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/variables.css}"/>
    <link rel="stylesheet" th:href="@{/css/nav.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">IT</div>
        <h1 class="auth-title">Quên mật khẩu</h1>
        <p class="auth-sub">Nhập email để nhận link đặt lại mật khẩu</p>

        <div th:if="${successMessage}" class="auth-success">
            <svg viewBox="0 0 24 24">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="auth-error">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="auth-group">
                <label class="auth-label" for="email">Email tài khoản</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input class="auth-input" type="email" id="email" name="email"
                           placeholder="example@email.com" required/>
                </div>
            </div>
            <button type="submit" class="auth-btn">Gửi email đặt lại mật khẩu</button>
        </form>

        <div class="auth-bottom"><a th:href="@{/login}">← Quay lại đăng nhập</a></div>
    </div>
    <div class="auth-copyright">© 2026 JobHunter. All rights reserved.</div>
</main>
</body>
</html>
