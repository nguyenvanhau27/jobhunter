<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký — JobHunter</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}"/>
    <link rel="stylesheet" th:href="@{/css/nav.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">IT</div>
        <h1 class="auth-title">Đăng ký tài khoản</h1>
        <p class="auth-sub">Tạo tài khoản miễn phí ngay hôm nay</p>

        <!-- Email trùng hoặc lỗi khác -->
        <div th:if="${errorMessage}" class="auth-error">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/register}" th:object="${registerDTO}" method="post" id="regForm">

            <!-- Họ tên -->
            <div class="auth-group">
                <label class="auth-label" for="fullName">Họ tên</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input class="auth-input"
                           th:field="*{fullName}"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'has-error' : ''"
                           type="text" id="fullName"
                           placeholder="Nguyễn Văn A"
                           autocomplete="name"/>
                </div>
                <div th:if="${#fields.hasErrors('fullName')}" class="auth-field-error">
                    <span th:errors="*{fullName}"></span>
                </div>
            </div>

            <!-- Email -->
            <div class="auth-group">
                <label class="auth-label" for="email">Email</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input class="auth-input"
                           th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'has-error' : ''"
                           type="email" id="email"
                           placeholder="example@email.com"
                           autocomplete="email"/>
                </div>
                <div th:if="${#fields.hasErrors('email')}" class="auth-field-error">
                    <span th:errors="*{email}"></span>
                </div>
            </div>

            <!-- Mật khẩu -->
            <div class="auth-group">
                <label class="auth-label" for="password">Mật khẩu</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input class="auth-input"
                           th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'has-error' : ''"
                           type="password" id="password"
                           placeholder="Ít nhất 6 ký tự"
                           autocomplete="new-password"/>
                    <button type="button" class="auth-eye" onclick="togglePwd('password',this)" tabindex="-1">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="auth-field-error">
                    <span th:errors="*{password}"></span>
                </div>
            </div>

            <!-- Số điện thoại -->
            <div class="auth-group">
                <label class="auth-label" for="phone">Số điện thoại</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81A16 16 0 0 0 16 16.91l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    <input class="auth-input"
                           th:field="*{phone}"
                           type="tel" id="phone"
                           placeholder="0123 456 789"
                           autocomplete="tel"/>
                </div>
            </div>

            <!-- Địa chỉ -->
            <div class="auth-group">
                <label class="auth-label" for="address">Địa chỉ</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <input class="auth-input"
                           th:field="*{address}"
                           type="text" id="address"
                           placeholder="TP. Hồ Chí Minh"
                           autocomplete="street-address"/>
                </div>
            </div>

            <!-- Terms checkbox -->
            <div class="auth-checkbox-wrap">
                <input type="checkbox" id="terms" required/>
                <label class="auth-checkbox-label" for="terms">
                    Tôi đồng ý với
                    <a href="#">Điều khoản dịch vụ</a>
                    và
                    <a href="#">Chính sách bảo mật</a>
                </label>
            </div>

            <button type="submit" class="auth-btn">Đăng ký</button>
        </form>

        <div class="auth-divider"><span>hoặc</span></div>

        <button class="auth-google" type="button" disabled
                style="opacity:.55;cursor:not-allowed;" title="Tính năng đang phát triển">
      <span class="google-g">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4"
                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05"
                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
      </span>
            Đăng ký với Google
        </button>

        <div class="auth-bottom">
            Đã có tài khoản?&nbsp;<a th:href="@{/login}">Đăng nhập</a>
        </div>
    </div>

    <div class="auth-copyright">© 2026 JobHunter. All rights reserved.</div>
</main>

<script>
    function togglePwd(id, btn) {
        const inp = document.getElementById(id);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.querySelector('svg').innerHTML = show
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
</script>
</body>
</html>
