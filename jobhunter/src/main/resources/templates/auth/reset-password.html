<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập — JobHunter</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}"/>
    <link rel="stylesheet" th:href="@{/css/nav.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">IT</div>
        <h1 class="auth-title">Đăng nhập</h1>
        <p class="auth-sub">Chào mừng bạn trở lại JobHunter</p>

        <!-- Pre-fill note sau register -->
        <div th:if="${prefillEmail}" class="auth-prefill-note">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Email đã được điền tự động. Vui lòng nhập mật khẩu.
        </div>

        <!-- Register success -->
        <div th:if="${successMessage}" class="auth-success">
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- Logout success -->
        <div th:if="${param.logout}" class="auth-success">
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Đã đăng xuất thành công.
        </div>

        <!-- Login error -->
        <div th:if="${param.error}" class="auth-error">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Email hoặc mật khẩu không chính xác.
        </div>

        <form th:action="@{/login}" method="post">

            <!-- Email -->
            <div class="auth-group">
                <label class="auth-label" for="email">Email</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input class="auth-input" type="email" id="email" name="email"
                           th:value="${prefillEmail}"
                           placeholder="example@email.com"
                           autocomplete="email" required/>
                </div>
            </div>

            <!-- Password -->
            <div class="auth-group">
                <label class="auth-label" for="password">Mật khẩu</label>
                <div class="auth-input-wrap">
                    <svg class="auth-input-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input class="auth-input" type="password" id="password" name="password"
                           placeholder="Nhập mật khẩu"
                           autocomplete="current-password" required/>
                    <button type="button" class="auth-eye" onclick="togglePwd('password',this)" tabindex="-1">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Forgot link -->
            <a th:href="@{/forgot-password}" class="auth-forgot">Quên mật khẩu?</a>

            <button type="submit" class="auth-btn">Đăng nhập</button>
        </form>

        <div class="auth-divider"><span>hoặc</span></div>

        <button class="auth-google" type="button" disabled
                style="opacity:.55;cursor:not-allowed;" title="Tính năng đang phát triển">
      <span class="google-g">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
      </span>
            Đăng nhập với Google
        </button>

        <div class="auth-bottom">
            Chưa có tài khoản?&nbsp;<a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>

    <div class="auth-copyright">© 2026 JobHunter. All rights reserved.</div>
</main>

<script>
    function togglePwd(id, btn) {
        const inp = document.getElementById(id);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.querySelector('svg').innerHTML = show
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
</script>
</body>
</html>
