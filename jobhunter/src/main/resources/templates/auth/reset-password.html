<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>
</head>
<body>

<h2>Đặt lại mật khẩu</h2>

<div th:if="${successMessage}" style="color:green; font-weight:bold;">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${errorMessage}" style="color:red; font-weight:bold;">
    <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/reset-password}" method="post">
    <input type="hidden" name="token" th:value="${token}"/>

    <div>
        <label>Mật khẩu mới (ít nhất 6 ký tự):</label><br/>
        <input type="password" name="newPassword" required minlength="6"/>
    </div>
    <br/>
    <div>
        <label>Xác nhận mật khẩu mới:</label><br/>
        <input type="password" name="confirmPassword" required minlength="6"/>
    </div>
    <br/>
    <button type="submit">Đặt lại mật khẩu</button>
</form>

</body>
</html>
